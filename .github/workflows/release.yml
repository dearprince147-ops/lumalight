name: Build and Release APK

# Two ways to trigger this:
#  1. Push a tag like "v1.1.0" -> builds and publishes a proper GitHub Release
#     named after the tag.
#       git tag v1.1.0 && git push origin v1.1.0
#  2. Actions tab -> "Build and Release APK" -> "Run workflow" -> builds and
#     publishes a rolling pre-release named after the run number, no tag
#     needed. Handy for grabbing a fresh build from Termux without a full
#     Android Studio setup.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        id: rename
        run: |
          VERSION="${GITHUB_REF_NAME:-run-${GITHUB_RUN_NUMBER}}"
          NEW_NAME="lumalight-${VERSION}.apk"
          cp "${{ steps.apk.outputs.path }}" "$NEW_NAME"
          echo "name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}"
          name: "${{ github.ref_type == 'tag' && github.ref_name || format('Build {0}', github.run_number) }}"
          prerelease: ${{ github.ref_type != 'tag' }}
          files: "${{ steps.rename.outputs.name }}"
          generate_release_notes: true
